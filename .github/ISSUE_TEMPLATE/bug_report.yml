name: Bug Report
description: Report an error or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: If applicable, add screenshots or paste relevant error logs.
  - type: input
    id: version
    attributes:
      label: App version
      description: Which version of the app are you using?
      placeholder: e.g. 1.2.0
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Your device and OS.
      placeholder: e.g. Windows 11, Android 14, iOS 17
